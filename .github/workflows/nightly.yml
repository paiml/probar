name: Nightly Binary Release

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: probador
            artifact: probador-x86_64-linux
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: probador
            artifact: probador-x86_64-macos
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: probador
            artifact: probador-aarch64-macos
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: probador.exe
            artifact: probador-x86_64-windows.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p probador

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p probador

      - name: Find and rename binary
        shell: bash
        run: |
          echo "=== Debug: pwd ==="
          pwd
          echo "=== Debug: ls top-level ==="
          ls -la
          echo "=== Debug: target dir exists? ==="
          ls -la target/ 2>/dev/null || echo "NO target/ directory!"
          echo "=== Debug: find all executables in target ==="
          find target -type f -executable 2>/dev/null | grep -v deps/ | grep -v '\.d$' | head -20 || true
          echo "=== Debug: find by name ==="
          find . -name "${{ matrix.binary }}" -type f 2>/dev/null | head -10 || true
          echo "=== Looking for binary ==="
          # Search multiple possible paths
          BINARY=""
          for P in \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "target/release/${{ matrix.binary }}" \
            ; do
            if [ -f "$P" ]; then
              BINARY="$P"
              break
            fi
          done
          if [ -z "$BINARY" ]; then
            # Last resort: find it anywhere
            BINARY=$(find . -name "${{ matrix.binary }}" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$BINARY" ]; then
            echo "Found binary at: $BINARY"
            cp "$BINARY" "${{ matrix.artifact }}"
          else
            echo "::error::Binary ${{ matrix.binary }} not found anywhere"
            echo "=== All files in target/release ==="
            ls -la target/release/ 2>/dev/null || echo "no target/release/"
            ls -la "target/${{ matrix.target }}/release/" 2>/dev/null || echo "no target/${{ matrix.target }}/release/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Delete existing nightly tag
        run: gh release delete nightly --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ github.sha }})"
          body: |
            Automated nightly build from `main` branch.
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          prerelease: true
          files: release/*
          make_latest: false
